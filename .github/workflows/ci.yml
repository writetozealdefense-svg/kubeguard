name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  build-test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.out ./...
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: SARIF 2.1.0 schema conformance
        # Validates emitted SARIF (vulnerable + hardened) against the official
        # SARIF 2.1.0 JSON Schema. Behind the sarif_schema build tag so the
        # default test run stays fast.
        run: go test -tags sarif_schema ./internal/report/ -run SARIFConforms

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6

  harden-validate:
    name: harden bundle · kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: emit hardened bundle
        run: go run ./cmd/kubeguard harden -o /tmp/bundle
      - name: install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@latest
      - name: validate manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas /tmp/bundle/*.yaml
          kubeconform -strict -summary -ignore-missing-schemas deploy/*.yaml

  cross-compile:
    name: cross-compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          go build -o /dev/null ./cmd/kubeguard
          go build -o /dev/null ./cmd/kubectl-kubeguard
