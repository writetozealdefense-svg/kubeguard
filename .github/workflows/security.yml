name: security

# Security gates (Squad P2). These BLOCK the pipeline on findings.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly drift scan
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_VERSION: latest

  trivy-fs:
    name: Filesystem & config scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem (vuln + misconfig + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  trivy-image:
    name: Container image scan (trivy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile
            context: .
          - name: web
            dockerfile: web/Dockerfile
            context: web
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: kubeguard-${{ matrix.name }}:pr-scan
      - name: Trivy image (vuln + misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: kubeguard-${{ matrix.name }}:pr-scan
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  npm-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm audit --audit-level=high

  sbom:
    name: Generate SBOMs (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Go SBOM (cyclonedx-gomod)
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod mod -json -output kubeguard-go.cdx.json
      - name: Frontend SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: ./web
          format: cyclonedx-json
          output-file: kubeguard-web.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: "*.cdx.json"
