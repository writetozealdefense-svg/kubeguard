# Static SPA serving with security headers + API proxy. The dashboard talks only
# to KubeGuard's own API; /v1, /healthz, /readyz are proxied to the BFF service.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers for the static app (the API sets its own).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Cache hashed assets aggressively; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Proxy API calls to the BFF (override BFF_HOST at deploy time).
    location ~ ^/(v1|healthz|readyz)(/|$) {
        proxy_pass http://${BFF_HOST};
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off; # SSE
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
