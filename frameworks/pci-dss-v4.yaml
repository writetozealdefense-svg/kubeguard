id: pci-dss-v4
title: PCI DSS v4.0
version: "4.0"
disclaimer: "Indicative mapping to KubeGuard checks only; not a PCI DSS assessment by a QSA."
controls:
  - id: "1.3.1"
    title: Inbound traffic to the CDE is restricted
    mapsTo: ["KG-017", "KG-018"]
    assessable: true
  - id: "2.2.1"
    title: Configuration standards are applied to system components
    mapsTo: ["KG-001", "KG-002", "KG-009", "KG-020"]
    assessable: true
  - id: "6.4.1"
    title: Public-facing web applications are protected against attacks
    mapsTo: ["KG-018"]
    assessable: true
  - id: "7.2.1"
    title: Access is assigned based on least privilege
    mapsTo: ["KG-011", "KG-012", "KG-016"]
    assessable: true
  - id: "8.3.1"
    title: Strong authentication for access to system components
    mapsTo: ["KG-013", "KG-015"]
    assessable: true
