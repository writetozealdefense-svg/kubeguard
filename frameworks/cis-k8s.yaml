id: cis-k8s
title: CIS Kubernetes Benchmark
version: "1.9"
disclaimer: "Indicative mapping to KubeGuard checks only; not a CIS certification or audit."
controls:
  - id: "5.1.1"
    title: Ensure cluster-admin is used only where required
    mapsTo: ["KG-011"]
    assessable: true
  - id: "5.1.3"
    title: Minimize wildcard use in Roles and ClusterRoles
    mapsTo: ["KG-012"]
    assessable: true
  - id: "5.1.5"
    title: Ensure default service accounts are not actively used
    mapsTo: ["KG-016"]
    assessable: true
  - id: "5.1.6"
    title: Ensure SA tokens are only mounted where necessary
    mapsTo: ["KG-015"]
    assessable: true
  - id: "5.2.1"
    title: Minimize admission of privileged containers
    mapsTo: ["KG-001"]
    assessable: true
  - id: "5.2.4"
    title: Minimize admission of containers wishing to share the host network
    mapsTo: ["KG-003", "KG-004"]
    assessable: true
  - id: "5.2.8"
    title: Minimize admission of containers with added capabilities
    mapsTo: ["KG-008"]
    assessable: true
  - id: "5.3.2"
    title: Ensure all namespaces have network policies defined
    mapsTo: ["KG-017"]
    assessable: true
  - id: "5.7.3"
    title: Apply security context to pods and containers
    mapsTo: ["KG-006", "KG-007", "KG-009", "KG-020"]
    assessable: true
