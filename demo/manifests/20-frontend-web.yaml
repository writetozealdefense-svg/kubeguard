# Customer-facing web tier. Runs on the default ServiceAccount (KG-016), shares
# the host IPC namespace (KG-005), and is exposed via NodePort (KG-018).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: thamespay-frontend
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # serviceAccountName omitted -> uses "default" -> KG-016
      hostIPC: true            # KG-005
      containers:
        - name: web
          image: nginx:latest  # KG-019 (mutable tag)
          # No resources block -> KG-010
          securityContext:
            runAsUser: 0        # KG-006
            allowPrivilegeEscalation: true   # KG-007
            # readOnlyRootFilesystem unset -> KG-009
            # seccompProfile unset -> KG-020
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: thamespay-frontend
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
# No NetworkPolicy in thamespay-frontend -> KG-017.
