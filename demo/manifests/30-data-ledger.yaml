# Ledger datastore holding personal + cardholder data. A namespaced Role grants
# the ledger ServiceAccount read access to Secrets (KG-013) and its token is
# auto-mounted (KG-015). No NetworkPolicy guards the namespace (KG-017).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledger-sa
  namespace: thamespay-data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ledger-secret-reader
  namespace: thamespay-data
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]   # KG-013 (reads Secrets)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ledger-secret-reader-binding
  namespace: thamespay-data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ledger-secret-reader
subjects:
  - kind: ServiceAccount
    name: ledger-sa
    namespace: thamespay-data
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ledger
  namespace: thamespay-data
  labels:
    app: ledger
spec:
  serviceName: ledger
  replicas: 1
  selector:
    matchLabels:
      app: ledger
  template:
    metadata:
      labels:
        app: ledger
    spec:
      serviceAccountName: ledger-sa
      automountServiceAccountToken: true   # KG-015 (explicit)
      containers:
        - name: ledger
          image: postgres:latest   # KG-019 (mutable tag)
          # No resources block -> KG-010
          securityContext:
            runAsUser: 0            # KG-006
            # readOnlyRootFilesystem unset -> KG-009
            # seccompProfile unset -> KG-020
          ports:
            - containerPort: 5432
# No NetworkPolicy in thamespay-data -> KG-017.
