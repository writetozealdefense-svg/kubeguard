apiVersion: v1
kind: Service
metadata:
  name: {{ include "kgd.fullname" . }}-api
  labels:
    {{- include "kgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "kgd.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- if .Values.web.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kgd.fullname" . }}-web
  labels:
    {{- include "kgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "kgd.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
