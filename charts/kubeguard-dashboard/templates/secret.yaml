{{- $manageToken := and .Values.auth.adminToken.value (not .Values.auth.adminToken.existingSecret) -}}
{{- $managePg := and .Values.postgres.enabled .Values.postgres.dsn.value (not .Values.postgres.dsn.existingSecret) -}}
{{- if or $manageToken $managePg }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kgd.secretName" . }}
  labels:
    {{- include "kgd.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $manageToken }}
  KUBEGUARD_ADMIN_TOKEN: {{ .Values.auth.adminToken.value | quote }}
  {{- end }}
  {{- if $managePg }}
  KUBEGUARD_POSTGRES_DSN: {{ .Values.postgres.dsn.value | quote }}
  {{- end }}
{{- end }}
