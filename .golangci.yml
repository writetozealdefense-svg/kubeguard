# golangci-lint v2 configuration (https://golangci-lint.run).
version: "2"

run:
  timeout: 5m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - revive
    - misspell
    - unconvert
    - bodyclose
  exclusions:
    paths:
      # Vendored Go files inside the frontend's npm dependencies are not ours.
      - web/node_modules
    rules:
      # Test files may ignore errors from helpers and use dot-style assertions.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - web/node_modules
