# Read-only RBAC for KubeGuard live/service mode (ARCHITECTURE.md §5.2, §3).
# KubeGuard only ever lists these resources; it never creates, patches, or deletes.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeguard
  namespace: kubeguard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeguard-readonly
rules:
  - apiGroups: [""]
    resources: ["namespaces", "serviceaccounts", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeguard-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeguard-readonly
subjects:
  - kind: ServiceAccount
    name: kubeguard
    namespace: kubeguard
